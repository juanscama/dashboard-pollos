<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — Pollos El Cantor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #080808; color: #fff; min-height: 100vh; }

  .header { background: #0f0f0f; border-bottom: 2px solid #1a1a1a; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; color: #fff; line-height: 1; }
  .logo span { color: #EF9F27; }
  .live-row { display: flex; align-items: center; margin-top: 6px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #639922; margin-right: 8px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #639922; text-transform: uppercase; letter-spacing: 1px; }
  .hora { font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 600; color: #fff; line-height: 1; text-align: right; }
  .fecha-txt { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #444; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; text-align: right; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 20px 40px; }
  .stat { background: #111; border: 1px solid #1f1f1f; border-radius: 10px; padding: 16px 20px; position: relative; overflow: hidden; }
  .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat.total::before { background: #444; }
  .stat.urgente::before { background: #E24B4A; }
  .stat.cam1::before { background: #378ADD; }
  .stat.cam2::before { background: #1D9E75; }
  .stat.cam3::before { background: #EF9F27; }
  .stat .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
  .stat .value { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: #fff; }
  .stat .sublabel { font-size: 11px; color: #333; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  .stat.urgente .value { color: #E24B4A; }
  .stat.cam1 .value { color: #378ADD; }
  .stat.cam2 .value { color: #1D9E75; }
  .stat.cam3 .value { color: #EF9F27; }

  .section-title { padding: 0 40px 12px; font-size: 11px; color: #333; text-transform: uppercase; letter-spacing: 2px; font-family: 'IBM Plex Mono', monospace; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }

  .table-wrap { padding: 0 40px 40px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { border-bottom: 2px solid #1a1a1a; }
  th { color: #333; font-size: 11px; font-weight: 500; padding: 10px 14px; text-align: left; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'IBM Plex Mono', monospace; }
  tbody tr { border-bottom: 1px solid #111; }
  tbody tr:hover { background: #0f0f0f; }
  td { padding: 15px 14px; font-size: 17px; color: #aaa; }
  .td-cliente { font-weight: 600; color: #fff; font-size: 19px; }
  .td-tipo { color: #777; font-size: 16px; }
  .td-cantidad { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: #fff; font-size: 20px; }
  .td-dir { color: #444; font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
  .td-hora { color: #333; font-size: 13px; font-family: 'IBM Plex Mono', monospace; }

  .badge { display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 4px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.urgente { background: #1f0808; color: #E24B4A; border: 1px solid #3d1010; }
  .badge.normal { background: #081208; color: #639922; border: 1px solid #102010; }

  .cam { display: inline-block; font-size: 12px; padding: 4px 14px; border-radius: 4px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; }
  .cam-1 { background: #071525; color: #378ADD; border: 1px solid #0f2540; }
  .cam-2 { background: #071510; color: #1D9E75; border: 1px solid #0f2820; }
  .cam-3 { background: #151005; color: #EF9F27; border: 1px solid #2a1e05; }
  .cam-x { background: #151515; color: #555; border: 1px solid #222; }

  .loading { text-align: center; padding: 5rem; color: #222; font-family: 'IBM Plex Mono', monospace; font-size: 16px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Pollos <span>El Cantor</span></div>
    <div class="live-row">
      <span class="live-dot"></span>
      <span class="live-label" id="ultima">Conectando...</span>
    </div>
  </div>
  <div>
    <div class="hora" id="hora">--:--:--</div>
    <div class="fecha-txt" id="fecha"></div>
  </div>
</div>

<div class="stats">
  <div class="stat total">
    <div class="label">Total pedidos</div>
    <div class="value" id="total">—</div>
    <div class="sublabel">del dia</div>
  </div>
  <div class="stat urgente">
    <div class="label">Urgentes</div>
    <div class="value" id="urgentes">—</div>
    <div class="sublabel">prioridad alta</div>
  </div>
  <div class="stat cam1">
    <div class="label">Camión 1</div>
    <div class="value" id="c1">—</div>
    <div class="sublabel">zona norte</div>
  </div>
  <div class="stat cam2">
    <div class="label">Camión 2</div>
    <div class="value" id="c2">—</div>
    <div class="sublabel">zona sur</div>
  </div>
  <div class="stat cam3">
    <div class="label">Camión 3</div>
    <div class="value" id="c3">—</div>
    <div class="sublabel">zona centro</div>
  </div>
</div>

<div class="section-title">Pedidos del dia</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:18%">Cliente</th>
        <th style="width:17%">Tipo de pollo</th>
        <th style="width:9%">Cantidad</th>
        <th style="width:11%">Urgencia</th>
        <th style="width:13%">Camión</th>
        <th style="width:20%">Dirección</th>
        <th style="width:12%">Hora</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="loading">Cargando pedidos...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = '1KWpAYhScVq3CNGSzuxcf2XbZZMqx2QaSAZnTillrTnM';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja1`;

function camClass(cam) {
  if (!cam) return 'cam-x';
  const c = cam.toString().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (c.includes('3')) return 'cam-3';
  if (c.includes('2')) return 'cam-2';
  if (c.includes('1')) return 'cam-1';
  return 'cam-x';
}

function formatHora(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  } catch { return raw; }
}

function actualizarHora() {
  const now = new Date();
  document.getElementById('hora').textContent = now.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('fecha').textContent = now.toLocaleDateString('es-CO', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

async function cargarPedidos() {
  try {
    const res = await fetch(URL + '&_=' + Date.now());
    const text = await res.text();
    const clean = text.replace('/*O_o*/', '').replace('google.visualization.Query.setResponse(', '').slice(0, -2);
    const json = JSON.parse(clean);
    const rows = json.table.rows || [];

    const hoy = new Date();
    const hoyStr = hoy.toISOString().split('T')[0];

    const pedidos = rows.filter(r => {
      if (!r.c || !r.c[1] || !r.c[1].v) return false;
      if (!r.c[0] || !r.c[0].v) return true;
      try {
        const fechaPedido = new Date(r.c[0].v).toISOString().split('T')[0];
        return fechaPedido === hoyStr;
      } catch { return true; }
    }).map(r => ({
      fecha: r.c[0] ? r.c[0].v : '',
      cliente: r.c[1] ? r.c[1].v : '',
      tipo: r.c[2] ? r.c[2].v : '',
      cantidad: r.c[3] ? r.c[3].v : '',
      urgencia: r.c[4] ? r.c[4].v : '',
      camion: r.c[5] ? r.c[5].v : '',
      direccion: r.c[6] ? r.c[6].v : ''
    }));

    const tbody = document.getElementById('tbody');
    if (pedidos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">Sin pedidos registrados hoy</td></tr>';
    } else {
      tbody.innerHTML = pedidos.map(p => {
        const esUrgente = p.urgencia && p.urgencia.toUpperCase().includes('URG');
        return `<tr>
          <td class="td-cliente">${p.cliente}</td>
          <td class="td-tipo">${p.tipo}</td>
          <td class="td-cantidad">${p.cantidad}</td>
          <td><span class="badge ${esUrgente ? 'urgente' : 'normal'}">${p.urgencia || 'Normal'}</span></td>
          <td><span class="cam ${camClass(p.camion)}">${p.camion || '—'}</span></td>
          <td class="td-dir">${p.direccion || '—'}</td>
          <td class="td-hora">${formatHora(p.fecha)}</td>
        </tr>`;
      }).join('');
    }

    const urgentes = pedidos.filter(p => p.urgencia && p.urgencia.toUpperCase().includes('URG')).length;
    const c1 = pedidos.filter(p => camClass(p.camion) === 'cam-1').length;
    const c2 = pedidos.filter(p => camClass(p.camion) === 'cam-2').length;
    const c3 = pedidos.filter(p => camClass(p.camion) === 'cam-3').length;

    document.getElementById('total').textContent = pedidos.length;
    document.getElementById('urgentes').textContent = urgentes;
    document.getElementById('c1').textContent = c1;
    document.getElementById('c2').textContent = c2;
    document.getElementById('c3').textContent = c3;
    document.getElementById('ultima').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-CO');
  } catch(e) {
    document.getElementById('ultima').textContent = 'Error de conexion — reintentando...';
  }
}

actualizarHora();
setInterval(actualizarHora, 1000);
cargarPedidos();
setInterval(cargarPedidos, 30000);
</script>
</body>
</html>
