<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos del Día — Pollos El Cantor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
  }
  .header {
    background: #111;
    border-bottom: 1px solid #1f1f1f;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header .sub {
    font-size: 13px;
    color: #555;
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .hora {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: #fff;
    text-align: right;
  }
  .estado {
    font-size: 11px;
    color: #3B6D11;
    text-align: right;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 20px 32px;
  }
  .stat {
    background: #141414;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    padding: 16px 20px;
  }
  .stat .label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .stat .value {
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
  }
  .stat.urgente .value { color: #E24B4A; }
  .stat.cam1 .value { color: #378ADD; }
  .stat.cam2 .value { color: #1D9E75; }
  .stat.cam3 .value { color: #EF9F27; }
  .table-wrap { padding: 0 32px 32px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { border-bottom: 1px solid #1f1f1f; }
  th {
    color: #444;
    font-size: 11px;
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace;
  }
  td {
    padding: 14px 14px;
    font-size: 16px;
    color: #ccc;
    border-bottom: 1px solid #141414;
  }
  tr:hover td { background: #111; }
  .cliente { font-weight: 600; color: #fff; font-size: 17px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 500;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge.urgente { background: #2d0f0f; color: #E24B4A; border: 1px solid #3d1515; }
  .badge.normal { background: #0f1f0f; color: #639922; border: 1px solid #152815; }
  .cam {
    display: inline-block;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 4px;
    font-weight: 500;
    font-family: 'IBM Plex Mono', monospace;
  }
  .cam-1 { background: #091828; color: #378ADD; border: 1px solid #0f2840; }
  .cam-2 { background: #081a12; color: #1D9E75; border: 1px solid #0f2a1e; }
  .cam-3 { background: #1e1400; color: #EF9F27; border: 1px solid #2d1e00; }
  .loading { text-align: center; padding: 4rem; color: #333; font-family: 'IBM Plex Mono', monospace; font-size: 14px; }
  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #639922;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Pedidos del dia — Pollos El Cantor</h1>
    <div class="sub" id="ultima">Conectando...</div>
  </div>
  <div>
    <div class="hora" id="hora">--:--:--</div>
    <div class="estado"><span class="dot"></span><span id="estado">En vivo</span></div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="label">Total pedidos</div>
    <div class="value" id="total">—</div>
  </div>
  <div class="stat urgente">
    <div class="label">Urgentes</div>
    <div class="value" id="urgentes">—</div>
  </div>
  <div class="stat cam1">
    <div class="label">Camión 1</div>
    <div class="value" id="c1">—</div>
  </div>
  <div class="stat cam2">
    <div class="label">Camión 2</div>
    <div class="value" id="c2">—</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:22%">Cliente</th>
        <th style="width:22%">Tipo de pollo</th>
        <th style="width:10%">Cantidad</th>
        <th style="width:13%">Urgencia</th>
        <th style="width:15%">Camión</th>
        <th style="width:18%">Hora registro</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="loading">Cargando pedidos...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SHEET_ID = '1KWpAYhScVq3CNGSzuxcf2XbZZMqx2QaSAZnTillrTnM';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Hoja1`;

function camClass(cam) {
  if (!cam) return '';
  const c = cam.toString().toUpperCase();
  if (c.includes('1') || c.includes('01')) return 'cam-1';
  if (c.includes('2') || c.includes('02')) return 'cam-2';
  return 'cam-3';
}

function formatHora(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  } catch { return raw; }
}

function actualizarHora() {
  const now = new Date();
  document.getElementById('hora').textContent = now.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function cargarPedidos() {
  try {
    const res = await fetch(URL + '&_=' + Date.now());
    const text = await res.text();
    const clean = text.replace('/*O_o*/', '').replace('google.visualization.Query.setResponse(', '').slice(0, -2);
    const json = JSON.parse(clean);
    const rows = json.table.rows || [];

    const pedidos = rows.filter(r => r.c && r.c[1] && r.c[1].v).map(r => ({
      fecha: r.c[0] ? r.c[0].v : '',
      cliente: r.c[1] ? r.c[1].v : '',
      tipo: r.c[2] ? r.c[2].v : '',
      cantidad: r.c[3] ? r.c[3].v : '',
      urgencia: r.c[4] ? r.c[4].v : '',
      camion: r.c[5] ? r.c[5].v : ''
    }));

    const tbody = document.getElementById('tbody');
    if (pedidos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="loading">Sin pedidos registrados hoy</td></tr>';
    } else {
      tbody.innerHTML = pedidos.map(p => `
        <tr>
          <td class="cliente">${p.cliente}</td>
          <td>${p.tipo}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-weight:500;color:#fff">${p.cantidad}</td>
          <td><span class="badge ${p.urgencia && p.urgencia.toUpperCase().includes('URG') ? 'urgente' : 'normal'}">${p.urgencia || 'Normal'}</span></td>
          <td><span class="cam ${camClass(p.camion)}">${p.camion || '—'}</span></td>
          <td style="color:#444;font-size:13px;font-family:'IBM Plex Mono',monospace">${formatHora(p.fecha)}</td>
        </tr>
      `).join('');
    }

    const urgentes = pedidos.filter(p => p.urgencia && p.urgencia.toUpperCase().includes('URG')).length;
    const c1 = pedidos.filter(p => p.camion && (p.camion.includes('1') || p.camion.includes('01'))).length;
    const c2 = pedidos.filter(p => p.camion && (p.camion.includes('2') || p.camion.includes('02'))).length;

    document.getElementById('total').textContent = pedidos.length;
    document.getElementById('urgentes').textContent = urgentes;
    document.getElementById('c1').textContent = c1;
    document.getElementById('c2').textContent = c2;
    document.getElementById('ultima').textContent = 'Ultima actualizacion: ' + new Date().toLocaleTimeString('es-CO');
    document.getElementById('estado').textContent = 'En vivo';
  } catch(e) {
    document.getElementById('estado').textContent = 'Error de conexion';
  }
}

actualizarHora();
setInterval(actualizarHora, 1000);
cargarPedidos();
setInterval(cargarPedidos, 30000);
</script>
</body>
</html>
