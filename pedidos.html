<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Registro de Pedidos — Pollos El Cantor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #f5f4f0; min-height: 100vh; color: #1a1a1a; }

.top { background: #1a1a1a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.top-logo { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 1px; }
.top-logo span { color: #EF9F27; }
.top-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }

.main { max-width: 640px; margin: 0 auto; padding: 24px 16px 80px; }

.card { background: #fff; border-radius: 12px; border: 1px solid #e8e6e0; margin-bottom: 16px; overflow: hidden; }
.card-header { background: #1a1a1a; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.card-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
.card-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }
.card-body { padding: 18px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
.field select, .field input { width: 100%; padding: 10px 14px; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; border: 1.5px solid #e0ddd6; border-radius: 8px; background: #fafaf8; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
.field select:focus, .field input:focus { border-color: #1a1a1a; background: #fff; }
.field input[type="number"] { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; }

.productos-section { }
.producto-row { display: grid; grid-template-columns: 1fr 80px 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
.producto-row input, .producto-row select { margin: 0; }
.remove-btn { width: 36px; height: 36px; border: 1.5px solid #e0ddd6; border-radius: 8px; background: #fafaf8; color: #aaa; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.remove-btn:hover { border-color: #E24B4A; color: #E24B4A; background: #fff5f5; }
.add-producto { width: 100%; padding: 10px; border: 1.5px dashed #d0cdc6; border-radius: 8px; background: transparent; color: #aaa; font-size: 13px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
.add-producto:hover { border-color: #1a1a1a; color: #1a1a1a; }

.urgencia-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.urgencia-btn { padding: 10px 8px; border: 1.5px solid #e0ddd6; border-radius: 8px; background: #fafaf8; color: #888; font-size: 12px; font-family: 'IBM Plex Mono', monospace; cursor: pointer; text-align: center; transition: all 0.15s; font-weight: 500; }
.urgencia-btn.selected-normal { border-color: #3B6D11; background: #EAF3DE; color: #3B6D11; }
.urgencia-btn.selected-urgente { border-color: #A32D2D; background: #FCEBEB; color: #A32D2D; }
.urgencia-btn.selected-muy { border-color: #633806; background: #FAEEDA; color: #633806; }

.pedidos-list { margin-bottom: 16px; }
.pedido-item { background: #fff; border: 1px solid #e8e6e0; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.pedido-info { flex: 1; }
.pedido-cliente { font-weight: 600; font-size: 15px; color: #1a1a1a; margin-bottom: 4px; }
.pedido-productos { font-size: 13px; color: #888; }
.pedido-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.badge-urg { background: #FCEBEB; color: #A32D2D; }
.badge-muy { background: #FAEEDA; color: #633806; }
.badge-norm { background: #EAF3DE; color: #3B6D11; }
.badge-cam { background: #E6F1FB; color: #0C447C; }
.delete-pedido { padding: 6px 10px; border: 1px solid #e0ddd6; border-radius: 6px; background: #fafaf8; color: #ccc; font-size: 14px; cursor: pointer; }
.delete-pedido:hover { border-color: #E24B4A; color: #E24B4A; }

.empty-state { text-align: center; padding: 2rem; color: #ccc; font-size: 14px; font-family: 'IBM Plex Mono', monospace; }

.btn-add { width: 100%; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; cursor: pointer; margin-bottom: 12px; transition: background 0.15s; }
.btn-add:hover { background: #333; }

.btn-send { width: 100%; padding: 16px; background: #EF9F27; color: #1a1a1a; border: none; border-radius: 10px; font-size: 16px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn-send:hover { background: #d48a1a; }
.btn-send:disabled { background: #e0ddd6; color: #aaa; cursor: not-allowed; }

.success-msg { display: none; background: #EAF3DE; border: 1px solid #97C459; border-radius: 10px; padding: 16px; text-align: center; color: #3B6D11; font-weight: 600; margin-top: 12px; }
.error-msg { display: none; background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 14px; text-align: center; color: #A32D2D; font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>

<div class="top">
  <div class="top-logo">Pollos <span>El Cantor</span></div>
  <div class="top-date" id="topDate"></div>
</div>

<div class="main">

  <div class="card">
    <div class="card-header">
      <span class="card-title">Nuevo pedido</span>
    </div>
    <div class="card-body">

      <div class="field">
        <label>Cliente</label>
        <select id="clienteSelect">
          <option value="">— Selecciona cliente —</option>
          <option value="LAURA">Laura</option>
          <option value="SEBASTIAN">Sebastian</option>
          <option value="CAMILO">Camilo</option>
          <option value="JUAN">Juan</option>
          <option value="PEDRO">Pedro</option>
        </select>
      </div>

      <div class="field">
        <label>Productos</label>
        <div class="productos-section" id="productosSection">
          <div class="producto-row" id="prod-0">
            <input type="text" placeholder="Ej: Pechugas 1.2kg" class="tipo-input" />
            <input type="number" placeholder="Cant." min="1" value="" class="cant-input" style="padding: 10px 8px; font-size:15px;" />
            <button class="remove-btn" onclick="removeProducto(this)" style="display:none">×</button>
          </div>
        </div>
        <button class="add-producto" onclick="addProducto()">+ Agregar otro producto</button>
      </div>

      <div class="field">
        <label>Prioridad</label>
        <div class="urgencia-row">
          <button class="urgencia-btn selected-normal" onclick="setUrgencia('NORMAL', this)">Normal</button>
          <button class="urgencia-btn" onclick="setUrgencia('URGENTE', this)">Urgente</button>
          <button class="urgencia-btn" onclick="setUrgencia('MUY URGENTE', this)">Muy urgente</button>
        </div>
      </div>

      <button class="btn-add" onclick="agregarPedido()">+ Agregar a la lista</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Pedidos del día</span>
      <span class="card-num" id="contadorPedidos">0 pedidos</span>
    </div>
    <div class="card-body">
      <div class="pedidos-list" id="pedidosList">
        <div class="empty-state">Aún no hay pedidos agregados</div>
      </div>
      <button class="btn-send" id="btnEnviar" onclick="enviarPedidos()" disabled>Enviar todos los pedidos</button>
      <div class="success-msg" id="successMsg">Pedidos enviados correctamente</div>
      <div class="error-msg" id="errorMsg">Error enviando los pedidos. Intenta de nuevo.</div>
    </div>
  </div>

</div>

<script>
const WEBHOOK = 'https://hook.us2.make.com/qqm09k9uzv9n9o5us4fo62hplbpgvgh8';

const CLIENTES = {
  'LAURA':     { dir: 'Carrera 65 No.169A-55 Bogota',      zona: 'norte'  },
  'SEBASTIAN': { dir: 'Carrera 14b No.148-56 Bogota',      zona: 'norte'  },
  'CAMILO':    { dir: 'Calle 38A Sur No.34d-51 Bogota',    zona: 'sur'    },
  'JUAN':      { dir: 'Calle 30 Sur No.50A-64 Bogota',     zona: 'sur'    },
  'PEDRO':     { dir: 'Carrera 11 No.82-71 Bogota',        zona: 'centro' }
};

let pedidos = [];
let urgenciaActual = 'NORMAL';
let prodCount = 1;

document.getElementById('topDate').textContent = new Date().toLocaleDateString('es-CO', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();

function setUrgencia(val, btn) {
  urgenciaActual = val;
  document.querySelectorAll('.urgencia-btn').forEach(b => b.className = 'urgencia-btn');
  if (val === 'NORMAL') btn.className = 'urgencia-btn selected-normal';
  else if (val === 'URGENTE') btn.className = 'urgencia-btn selected-urgente';
  else btn.className = 'urgencia-btn selected-muy';
}

function addProducto() {
  const section = document.getElementById('productosSection');
  const div = document.createElement('div');
  div.className = 'producto-row';
  div.id = `prod-${prodCount++}`;
  div.innerHTML = `
    <input type="text" placeholder="Ej: Pollos enteros" class="tipo-input" style="padding:10px 14px;font-size:15px;border:1.5px solid #e0ddd6;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;" />
    <input type="number" placeholder="Cant." min="1" class="cant-input" style="padding:10px 8px;font-size:15px;font-family:'IBM Plex Mono',monospace;font-weight:600;border:1.5px solid #e0ddd6;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;" />
    <button class="remove-btn" onclick="removeProducto(this)">×</button>
  `;
  section.appendChild(div);
  document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'flex');
}

function removeProducto(btn) {
  const row = btn.closest('.producto-row');
  row.remove();
  const rows = document.querySelectorAll('.producto-row');
  if (rows.length === 1) rows[0].querySelector('.remove-btn').style.display = 'none';
}

function agregarPedido() {
  const cliente = document.getElementById('clienteSelect').value;
  if (!cliente) { alert('Selecciona un cliente'); return; }

  const productos = [];
  document.querySelectorAll('.producto-row').forEach(row => {
    const tipo = row.querySelector('.tipo-input').value.trim();
    const cant = parseInt(row.querySelector('.cant-input').value) || 1;
    if (tipo) productos.push({ tipo, cant });
  });

  if (productos.length === 0) { alert('Agrega al menos un producto'); return; }

  const info = CLIENTES[cliente];
  pedidos.push({ cliente, productos, urgencia: urgenciaActual, dir: info.dir, zona: info.zona });

  renderPedidos();
  resetForm();
}

function resetForm() {
  document.getElementById('clienteSelect').value = '';
  document.getElementById('productosSection').innerHTML = `
    <div class="producto-row" id="prod-0">
      <input type="text" placeholder="Ej: Pechugas 1.2kg" class="tipo-input" style="padding:10px 14px;font-size:15px;border:1.5px solid #e0ddd6;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;" />
      <input type="number" placeholder="Cant." min="1" class="cant-input" style="padding:10px 8px;font-size:15px;font-family:'IBM Plex Mono',monospace;font-weight:600;border:1.5px solid #e0ddd6;border-radius:8px;background:#fafaf8;color:#1a1a1a;outline:none;" />
      <button class="remove-btn" onclick="removeProducto(this)" style="display:none">×</button>
    </div>
  `;
  urgenciaActual = 'NORMAL';
  document.querySelectorAll('.urgencia-btn').forEach((b, i) => {
    b.className = i === 0 ? 'urgencia-btn selected-normal' : 'urgencia-btn';
  });
}

function deletePedido(idx) {
  pedidos.splice(idx, 1);
  renderPedidos();
}

function renderPedidos() {
  const list = document.getElementById('pedidosList');
  const counter = document.getElementById('contadorPedidos');
  const btn = document.getElementById('btnEnviar');

  counter.textContent = `${pedidos.length} pedido${pedidos.length !== 1 ? 's' : ''}`;
  btn.disabled = pedidos.length === 0;

  if (pedidos.length === 0) {
    list.innerHTML = '<div class="empty-state">Aún no hay pedidos agregados</div>';
    return;
  }

  list.innerHTML = pedidos.map((p, i) => {
    const prods = p.productos.map(pr => `${pr.cant} ${pr.tipo}`).join(', ');
    const badgeClass = p.urgencia === 'NORMAL' ? 'badge-norm' : p.urgencia === 'URGENTE' ? 'badge-urg' : 'badge-muy';
    const camNum = p.zona === 'norte' ? '1' : p.zona === 'sur' ? '2' : '3';
    return `
      <div class="pedido-item">
        <div class="pedido-info">
          <div class="pedido-cliente">${p.cliente}</div>
          <div class="pedido-productos">${prods}</div>
          <div class="pedido-badges">
            <span class="badge ${badgeClass}">${p.urgencia}</span>
            <span class="badge badge-cam">CAMIÓN ${camNum}</span>
          </div>
        </div>
        <button class="delete-pedido" onclick="deletePedido(${i})">×</button>
      </div>
    `;
  }).join('');
}

async function enviarPedidos() {
  const btn = document.getElementById('btnEnviar');
  const success = document.getElementById('successMsg');
  const error = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  success.style.display = 'none';
  error.style.display = 'none';

  const lineas = [];
  pedidos.forEach(p => {
    p.productos.forEach(pr => {
      const camion = p.zona === 'norte' ? 'CAMION-1' : p.zona === 'sur' ? 'CAMION-2' : 'CAMION-3';
      lineas.push(`${p.cliente}|${pr.tipo}|${pr.cant}|${p.urgencia}|${camion}|${p.dir}`);
    });
  });

  const texto = lineas.join('\n');

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      mode: 'no-cors',
      body: `pedidos=${encodeURIComponent(texto)}`
    });
    if (res.ok || res.type === 'opaque') {
      success.style.display = 'block';
      success.textContent = `✓ ${pedidos.length} pedido(s) enviados correctamente`;
      pedidos = [];
      renderPedidos();
    } else {
      throw new Error('Error');
    }
  } catch(e) {
    error.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Enviar todos los pedidos';
}
</script>
</body>
</html>
